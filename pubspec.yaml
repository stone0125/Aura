name: habit_tracker
description: "A new Flutter project."
publish_to: 'none' # Private package

version: 1.0.1+4

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter

  # UI
  cupertino_icons: ^1.0.8
  provider: ^6.1.2

  # Date formatting
  intl: ^0.20.2

  # Local storage
  shared_preferences: ^2.5.4

  # Firebase
  firebase_core: ^4.3.0
  firebase_auth: ^6.1.3
  cloud_firestore: ^6.1.1
  cloud_functions: ^6.0.5
  google_sign_in: ^7.2.0
  sign_in_with_apple: ^7.0.1
  firebase_messaging: ^16.1.0
  firebase_analytics: ^12.0.0

  # Notifications
  flutter_local_notifications: ^19.5.0

  # Future work — RevenueCat subscription, not included in the dissertation report.
  purchases_flutter: ^9.10.0
  purchases_ui_flutter: ^9.10.1

  # URL launcher
  url_launcher: ^6.2.5

  # Charts
  fl_chart: ^1.1.1

  # Health data integration
  health: ^13.3.0

  # Device info (for bug reports)
  device_info_plus: ^12.3.0
  package_info_plus: ^8.0.0

  # Sharing and file export
  share_plus: ^12.0.0
  path_provider: ^2.1.0
  timezone: ^0.10.1
  flutter_timezone: 5.0.1
  open_filex: ^4.7.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4
  mocktail: ^1.0.4
  flutter_native_splash: ^2.4.3

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/icon.png"
  min_sdk_android: 21

flutter_native_splash:
  color: "#FF6B6B"
  color_dark: "#1E1818"
  # no image — Flutter splash handles icon display
  android_12:
    color: "#FF6B6B"
    color_dark: "#1E1818"
    # no image
  ios: true
  android: true
  web: false

flutter:
  uses-material-design: true

  assets:
    - assets/icon.png
